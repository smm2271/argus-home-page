<div class="space"></div>
<nav class="nav-container">
    <div class="nav-inner">
        <a class="brand" href="#">
            <div class="logo">
                <img src="logos/商標組合-反黑-01.png" alt="Logo" class="logo-img">
            </div>
        </a>

        @if (isDesktop) {
            <!-- Desktop: menu expanded inside the nav bar -->
            <div class="menu-desktop" role="menubar">
                @for (item of navItems; track item.route) {
                    <a class="menu-item" [routerLink]="item.route">{{ item.label }}</a>
                }
            </div>
        }

        @if (!isDesktop) {
            <!-- Hamburger button (mobile) -->
            <button class="hamburger" (click)="toggleMenu()" [attr.aria-expanded]="isOpen" aria-label="Menu">
                <span class="bar" [class.open]="isOpen"></span>
                <span class="bar" [class.open]="isOpen"></span>
                <span class="bar" [class.open]="isOpen"></span>
            </button>
        }
    </div>

    @if (!isDesktop) {
        <!-- Mobile: toggle with hamburger, keep in DOM for animation -->
        <div class="dropdown" role="menu" [class.open]="isOpen">
            @for (item of navItems; track item.route) {
                <a class="dropdown-item" [routerLink]="item.route" (click)="closeMenu()">{{ item.label }}</a>
            }
        </div>

        <!-- backdrop darkens the page and closes the menu when clicked -->
        <div class="backdrop" (click)="closeMenu()" [class.open]="isOpen"></div>
    }
</nav>
